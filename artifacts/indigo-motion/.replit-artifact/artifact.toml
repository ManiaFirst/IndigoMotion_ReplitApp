kind = "mobile"
previewPath = "/"
title = "Indigo Motion"
version = "1.0.0"
id = "artifacts/indigo-motion"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19469

[services.development]
run = "pnpm --filter @workspace/indigo-motion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/indigo-motion", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/indigo-motion", "run", "serve" ]

[services.env]
PORT = "19469"
BASE_PATH = "/"
